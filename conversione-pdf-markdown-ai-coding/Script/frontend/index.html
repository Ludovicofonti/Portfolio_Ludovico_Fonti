<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Markdown</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main id="app">
        <h1>PDF to Markdown Converter</h1>

        <div id="health-banner" class="banner hidden"></div>

        <!-- Upload Section -->
        <section id="upload-section">
            <div id="dropzone">
                <p>Drag &amp; drop a PDF here or click to select</p>
                <input type="file" id="file-input" accept=".pdf" multiple />
            </div>
        </section>

        <!-- Error Section -->
        <section id="error-section" class="hidden">
            <div class="error-message" id="error-message"></div>
        </section>

        <!-- Progress Section -->
        <section id="progress-section" class="hidden">
            <h2>Converting...</h2>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <p id="progress-text">Preparing...</p>
        </section>

        <!-- Preview Section -->
        <section id="preview-section" class="hidden">
            <h2>Markdown Preview</h2>
            <div id="confidence-warnings"></div>
            <pre id="markdown-preview"></pre>
            <button id="download-btn" class="btn">Download .md</button>
        </section>
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
